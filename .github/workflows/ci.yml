name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8f1998e9878d8571084571e285b04bba23e30948 # v1.2.0

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

      - name: Gas snapshot
        run: forge snapshot

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8f1998e9878d8571084571e285b04bba23e30948 # v1.2.0

      - name: Format check
        run: forge fmt --check

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8f1998e9878d8571084571e285b04bba23e30948 # v1.2.0

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither
        run: slither src/ --config-file slither.config.json
        continue-on-error: true
